name: Validate secure-auth

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  branch-name:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Require feature/, fix/, docs/, or chore/ prefix
        run: |
          BRANCH="${{ github.head_ref }}"
          case "$BRANCH" in
            feature/*|fix/*|docs/*|chore/*)
              echo "Branch name OK: $BRANCH"
              ;;
            *)
              echo "::error::Branch '$BRANCH' must use prefix feature/, fix/, docs/, or chore/"
              exit 1
              ;;
          esac

  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate monorepo
        run: npm run validate

      - name: Verify package contents
        run: npm pack --workspace @tgoliveira/secure-auth --dry-run --ignore-scripts
