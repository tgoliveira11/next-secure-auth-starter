name: Publish secure-auth to npm

on:
  push:
    tags:
      - "secure-auth-v0.1.*-internal"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Validate package version matches tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/secure-auth/package.json').version")
          EXPECTED_VERSION=${GITHUB_REF_NAME#secure-auth-v}
          if [ "$PACKAGE_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "Package version ($PACKAGE_VERSION) does not match tag version ($EXPECTED_VERSION)"
            exit 1
          fi

      - name: Build package
        run: npm run build -w @tgoliveira/secure-auth

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Pack dry run
        run: npm pack -w @tgoliveira/secure-auth --dry-run

      - name: Publish to npm
        run: npm publish -w @tgoliveira/secure-auth --tag internal
