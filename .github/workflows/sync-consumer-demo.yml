name: Sync consumer-demo routes

on:
  push:
    paths:
      - "packages/secure-auth/src/server/routes/create-routes.ts"
      - "scripts/consumer-demo-route-registry.mjs"

jobs:
  sync:
    name: Generate missing consumer-demo route files
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run route sync
        run: node scripts/sync-consumer-demo-routes.mjs

      - name: Check for generated files
        id: diff
        run: |
          git diff --name-only
          echo "changed=$(git diff --name-only | grep 'consumer-demo' | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: Commit generated routes
        if: steps.diff.outputs.changed != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/consumer-demo/src/app/api/
          git commit -m "chore(consumer-demo): sync route files with package [skip ci]"
          git push
